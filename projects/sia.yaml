version: 1.0.0
project:
  id: "sia"
  name: "SIA"
  category: "work_internal"
  domain: "industrial_maintenance"
  sensitivity: "internal"

purpose:
  description: >
    Work on the SIA project with durable notes, decisions, and artifacts.

scope:
  included:
    - "troubleshooting"
    - "RCA"
    - "SOPs"
    - "training plans"
    - "dashboards"
    - "SharePoint/Power Platform"
  excluded:
    - "speculative blame"
    - "unsafe procedures"
    - "policy guesses without sources"

default_roles:
  primary: "ops_troubleshooting"
  secondary:
    - "research"
    - "trainer_cap"

interaction_overrides:
  tone: "safety-first, precise"
  assumptions:
    - "state assumptions explicitly"
    - "separate facts from inference"

outputs:
  preferred:
    - "tables"
    - "decision gates (if X then Y)"
    - "stepwise SOPs"
    - "checklists"
  required_sections:
    - "Answer"
    - "Top hypotheses / options"
    - "Tests / steps (ordered)"
    - "Stop conditions / safety notes"
    - "Next actions"

handoff:
  store_results_in:
    - "GitHub (ai-context repo)"
    - "Notion"
    - "SharePoint (when applicable)"
