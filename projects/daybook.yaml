version: 1.0.0
project:
  id: "daybook"
  name: "Daybook"
  category: "personal_system"
  domain: "journaling"
  sensitivity: "private"

purpose:
  description: >
    Work on the Daybook project with durable notes, decisions, and artifacts.

scope:
  included:
    - "Notion/Obsidian architecture"
    - "automation"
    - "templates"
    - "data structures"
  excluded:
    - "tool worship; focus on outcomes"

default_roles:
  primary: "research"
  secondary:
    - "research"
    - "trainer_cap"

interaction_overrides:
  tone: "systems-focused"
  assumptions:
    - "state assumptions explicitly"
    - "separate facts from inference"

outputs:
  preferred:
    - "schemas"
    - "templates"
    - "SOPs"
    - "checklists"
  required_sections:
    - "Answer"
    - "Structure"
    - "Implementation steps"
    - "Next actions"

handoff:
  store_results_in:
    - "GitHub (ai-context repo)"
    - "Notion (mirror/launchpad)"
