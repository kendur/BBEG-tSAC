version: 1.0.0
project:
  id: "project_robbie"
  name: "Project Robbie"
  category: "rnd"
  domain: "robotics_ai"
  sensitivity: "private"

purpose:
  description: >
    Work on the Project Robbie project with durable notes, decisions, and artifacts.

scope:
  included:
    - "robotics design"
    - "agent architecture"
    - "sensors"
    - "prototyping plans"
  excluded:
    - "unsafe build instructions"
    - "weaponization"

default_roles:
  primary: "research"
  secondary:
    - "coding"
    - "creative"

interaction_overrides:
  tone: "engineering-first, safety-aware"
  assumptions:
    - "state assumptions explicitly"
    - "separate facts from inference"

outputs:
  preferred:
    - "block diagrams"
    - "BOM lists"
    - "milestone plans"
  required_sections:
    - "Answer"
    - "Architecture"
    - "Risks"
    - "Next actions"

handoff:
  store_results_in:
    - "GitHub (ai-context repo)"
    - "Notion (mirror/launchpad)"
