version: 1.0.0
project:
  id: "bbeg_tsac"
  name: "BBEG:tSAC"
  category: "creative"
  domain: "worldbuilding"
  sensitivity: "private"

purpose:
  description: >
    Work on the BBEG:tSAC project with durable notes, decisions, and artifacts.

scope:
  included:
    - "worldbuilding"
    - "story structure"
    - "character design"
    - "lore consistency"
  excluded:
    - "canon changes without explicit approval"

default_roles:
  primary: "creative"
  secondary:
    - "research"

interaction_overrides:
  tone: "structured creativity (options then convergence)"
  assumptions:
    - "state assumptions explicitly"
    - "separate facts from inference"

outputs:
  preferred:
    - "option sets"
    - "selection rationale"
    - "iteration steps"
  required_sections:
    - "Options"
    - "Recommendation"
    - "Rationale"
    - "Next actions"

handoff:
  store_results_in:
    - "GitHub (ai-context repo)"
    - "Notion (mirror/launchpad)"
