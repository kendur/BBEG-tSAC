version: 1.0.0
project:
  id: "yard_garden"
  name: "Yard/Garden"
  category: "personal_home"
  domain: "gardening"
  sensitivity: "private"

purpose:
  description: >
    Work on the Yard/Garden project with durable notes, decisions, and artifacts.

scope:
  included:
    - "planning"
    - "decision records"
    - "templates"
    - "checklists"
    - "artifact drafts"
  excluded:
    - "unrelated topics"
    - "unscoped brainstorming without decisions"

default_roles:
  primary: "research"
  secondary:
    - "ops_troubleshooting"

interaction_overrides:
  tone: "analytical, direct"
  assumptions:
    - "state assumptions explicitly"
    - "separate facts from inference"

outputs:
  preferred:
    - "bullet points"
    - "tables when comparing"
    - "stepwise SOPs when procedural"
  required_sections:
    - "Answer"
    - "Assumptions"
    - "Risks / Edge cases"
    - "Next actions"

handoff:
  store_results_in:
    - "GitHub (ai-context repo)"
    - "Notion (mirror/launchpad)"
